<svg width="360" height="92" viewBox="0 0 360 92" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">WellNext Nursing Lab WNL logo</title>
  <desc id="desc">Gradient W mark with WellNext Nursing Lab wordmark and WNL badge.</desc>
  <defs>
    <linearGradient id="wnlGrad" x1="3" y1="14" x2="96" y2="78" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#35C8C8"/>
      <stop offset="0.28" stop-color="#78D9B5"/>
      <stop offset="0.48" stop-color="#FF4AA7"/>
      <stop offset="0.68" stop-color="#FF83BA"/>
      <stop offset="1" stop-color="#F6D94A"/>
    </linearGradient>
    <linearGradient id="wnlGrad2" x1="18" y1="74" x2="90" y2="18" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FF3C9E"/>
      <stop offset="0.36" stop-color="#70D8BF"/>
      <stop offset="0.64" stop-color="#B7DE72"/>
      <stop offset="1" stop-color="#F6D94A"/>
    </linearGradient>
    <filter id="soft" x="-8" y="-8" width="120" height="120" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#0B1745" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Symbol -->
  <g filter="url(#soft)" stroke-linecap="round" stroke-linejoin="round">
    <path d="M13 24 L34 72 L53 32 L72 72 L93 24" stroke="url(#wnlGrad)" stroke-width="17"/>
    <path d="M34 72 L53 32 L72 72" stroke="url(#wnlGrad2)" stroke-width="17" opacity="0.96"/>
  </g>

  <!-- Wordmark -->
  <g fill="#071747">
    <text x="116" y="42" font-family="Inter, Avenir Next, Helvetica Neue, Arial, sans-serif" font-size="32" font-weight="800" letter-spacing="-1.3">WellNext</text>
    <text x="116" y="71" font-family="Inter, Avenir Next, Helvetica Neue, Arial, sans-serif" font-size="22" font-weight="700" letter-spacing="-0.5">Nursing Lab</text>
  </g>

  <!-- Badge -->
  <rect x="262" y="50" width="58" height="27" rx="13.5" stroke="#071747" stroke-width="2.2"/>
  <text x="291" y="69" text-anchor="middle" font-family="Inter, Avenir Next, Helvetica Neue, Arial, sans-serif" font-size="15" font-weight="800" fill="#071747">WNL</text>
</svg>
